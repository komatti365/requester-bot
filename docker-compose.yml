version: '3.9'

services:
  requester:
    build: .
    image: requester-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REQBOT_DB_URI
      - REQBOT_DB_KEY
      - REQBOT_TOKEN
      - REQBOT_WATCH_CHANNEL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
