version: '3.9'

services:
  requester:
    build: .
    image: requester-bot:latest
    restart: unless-stopped
    environment:
      # コンテナ内で読み込む.envファイルのパスを指定します
      - REQBOT_ENV_PATH=/app/config/.env
      # 共有APIキーのパス
      - REQBOT_DB_KEY_FILE=/secrets/shared_api_key.txt
    volumes:
      # ホスト側の.envファイルをコンテナ内に読み取り専用(ro)でマウントします
      # 左側 (/path/to/your/host/.env) を実際の.envファイルのパスに変更してください
      - /opt/selfdev/secret/requester.env:/app/config/.env:ro
      - /opt/selfdev/secret:/secrets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
